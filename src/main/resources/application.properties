server.port=8002

spring.application.name=Agro API
app.version=@project.version@
app.description=@project.description@

#----------- Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

#----------- PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sicredi_db}
spring.datasource.username=${DB_USERNAME:sicredi}
spring.datasource.password=${DB_PASSWORD:sicredi123}
spring.datasource.driver-class-name=org.postgresql.Driver

#----------- JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

#----------- Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
logging.level.org.flywaydb=DEBUG

#----------- Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:redis123}

#----------- Feign
cliente.produto-credito.url=https://desafio-credito-sicredi.wiremockapi.cloud

#----------- Resilience4j - Retry
resilience4j.retry.instances.produtoService.max-attempts=3
resilience4j.retry.instances.produtoService.wait-duration=500ms
resilience4j.retry.instances.produtoService.enable-exponential-backoff=true
resilience4j.retry.instances.produtoService.exponential-backoff-multiplier=2

#----------- Resilience4j - Circuit Breaker
resilience4j.circuitbreaker.instances.produtoService.sliding-window-size=10
resilience4j.circuitbreaker.instances.produtoService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.produtoService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.produtoService.permitted-number-of-calls-in-half-open-state=3

#----------- Resilience4j - Timeout
resilience4j.timelimiter.instances.produtoService.timeout-duration=2s

#----------- Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=@project.name@
info.app.version=@project.version@

#----------- Logging
logging.pattern.console=%d{HH:mm:ss} [%X{requestId}] %-5level %logger{36} - %msg%n